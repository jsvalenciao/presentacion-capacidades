const SectionHeader = ({ eyebrow, title, subtitle }) => (
    <div className="mb-8">
        {eyebrow && <p className="text-[10px] font-black uppercase tracking-[0.15em] text-bolivar-yellow mb-1">{eyebrow}</p>}
        <h1 className="text-3xl font-black text-slate-900 tracking-tight">{title}</h1>
        {subtitle && <p className="text-slate-500 text-base mt-2 font-medium">{subtitle}</p>}
    </div>
);

const Card = ({ children, className = "" }) => (
    <div className={`bg-white rounded-2xl border border-slate-200 shadow-sm p-6 ${className}`}>{children}</div>
);

const Badge = ({ label, color = "slate" }) => {
    const colors = {
        green: "bg-emerald-100 text-emerald-800",
        yellow: "bg-amber-100 text-amber-800",
        red: "bg-red-100 text-red-800",
        blue: "bg-blue-100 text-blue-800",
        purple: "bg-purple-100 text-purple-800",
        slate: "bg-slate-100 text-slate-600",
        teal: "bg-teal-100 text-teal-800",
    };
    return <span className={`text-[10px] font-black uppercase tracking-wider px-2.5 py-1 rounded-full ${colors[color] || colors.slate}`}>{label}</span>;
};

const StatCard = ({ label, value, sub, color = "green" }) => {
    const colors = { green: "text-bolivar-green-light", yellow: "text-bolivar-yellow", blue: "text-blue-600", red: "text-red-600" };
    return (
        <div className="bg-white rounded-2xl border border-slate-200 p-5 text-center shadow-sm">
            <p className={`text-3xl font-black ${colors[color]}`}>{value}</p>
            <p className="text-xs font-bold text-slate-800 mt-1">{label}</p>
            {sub && <p className="text-[10px] text-slate-400 mt-0.5">{sub}</p>}
        </div>
    );
};

const AlertBox = ({ type = "warn", text }) => {
    const styles = {
        warn: "bg-amber-50 border-amber-300 text-amber-800",
        danger: "bg-red-50 border-red-300 text-red-800",
        success: "bg-emerald-50 border-emerald-300 text-emerald-800",
        info: "bg-blue-50 border-blue-300 text-blue-800",
    };
    const icons = { warn: "warning", danger: "error", success: "check_circle", info: "info" };
    return (
        <div className={`flex items-start gap-3 p-4 rounded-xl border ${styles[type]} text-sm font-medium`}>
            <span className="material-symbols-outlined text-lg shrink-0 mt-0.5">{icons[type]}</span>
            <span>{text}</span>
        </div>
    );
};

                { tipo: "N", text: "El precio de WhatsApp en la propuesta V6 es $0.63/conversación. El precio de mercado (Infobip, Twilio) es entre $0.002 y $0.011. ¿Cómo justifica Salesforce ese precio?", context: "Diferencial de 57× a 260× vs. el mercado. Este es el punto de negociación más fuerte de toda la propuesta junto con la consolidación de contratos." },
                { tipo: "T", text: "¿Salesforce actúa como BSP directo de Meta para el canal de WhatsApp de SB, o usa un BSP tercero? ¿Cuál es ese BSP y qué nivel de SLA ofrece en Colombia?", context: "Si SF usa un intermediario adicional, eso explica el precio inflado y crea una capa de dependencia. Si es BSP directo, la justificación del precio es más difícil de sostener." },
                { tipo: "C", text: "¿Es posible usar Salesforce Digital Engagement para orquestar el journey, pero con el envío físico del mensaje a través de un BSP más económico (Infobip o Twilio) vía API?", context: "Esto permitiría aprovechar la orquestación de Agentforce sin pagar el markup de SF en WhatsApp. La pregunta es si la arquitectura lo permite o si el canal está cerrado al BSP de Salesforce." },
            ]
        },
        {
            num: 5, title: "Implementación y Freeway", tag: "Implementación", color: "purple",
            preguntas: [
                { tipo: "T", text: "La propuesta llegó a 6 versiones en 12 meses con cambios de alcance. ¿El alcance actual incluye la integración con Oracle Siebel, o quedó fuera en alguna revisión?", context: "La V4 retiró integraciones del alcance. Necesitamos la lista exacta de integraciones incluidas vs. lo que SB debe desarrollar por cuenta propia." },
                { tipo: "T", text: "¿El proyecto con Freeway incluye la configuración de Identity Resolution en Data 360 para unificar los IDs de Siebel, Flow 360, PureCloud y Centra?", context: "La Identity Resolution es el paso más crítico — sin ella el perfil unificado no existe y todos los casos de uso de Agentforce fallan. SB tiene el mismo cliente con 4 IDs distintos en 4 sistemas." },
                { tipo: "C", text: "¿La bolsa de horas de Freeway (mencionada en V3) está en la propuesta V6 y cuántas horas cubre? ¿Qué ocurre cuando se agotan?", context: "La propuesta tuvo ajuste específico de 'bolsa de horas' en V3. Queremos entender qué nivel de soporte post-go-live está incluido en el precio actual." },
                { tipo: "N", text: "¿Salesforce puede proveer un caso de éxito documentado de una aseguradora latinoamericana con Agentforce + Data 360 integrado con Siebel legacy?", context: "SB es un caso regulado (SFC). Necesitamos evidencia de que esta arquitectura ha funcionado en condiciones similares. En Dreamforce 2025 se presentó CaixaBank — ¿hay equivalente para LATAM seguros?" },
            ]
        },
        {
            num: 6, title: "Negociación y condiciones de cierre", tag: "Negociación", color: "slate",
            preguntas: [
                { tipo: "N", text: "SB tiene ~$247K en CDP/CEP y ~$22K en Field Service = ~$270K/año total en SF. Si consolidamos todo en un solo contrato incluyendo la propuesta V6, ¿qué descuento por volumen ofrece Salesforce?", context: "El gasto anual total en SF ya supera $270K USD. La consolidación en un contrato multianual es la palanca de negociación más fuerte. ¿Cuánto vale esa lealtad para Salesforce?" },
                { tipo: "N", text: "¿Salesforce ofrece un POC (proof of concept) sin costo para validar la integración Data 360 + Data Lake SB antes de comprometer el contrato completo?", context: "El riesgo técnico más alto es la integración Data 360 ↔ MongoDB Atlas (BYOL Federation). Validarlo en un piloto tiene sentido. SF también se beneficia de un caso de éxito documentado en Colombia." },
                { tipo: "N", text: "¿Existe una opción intermedia de soporte con TAM designado sin pagar los $98K/año del soporte Signature, dado el volumen total del contrato de SB?", context: "La diferencia entre Premier ($11K) y Signature ($98K) es de $87K/año. El único diferencial relevante es el TAM designado y 15 min vs. 1 hora en respuesta crítica. Podría negociarse en contrato multianual." },
                { tipo: "C", text: "¿Cuáles son las condiciones de salida del contrato? Específicamente, ¿qué pasa con los datos en Data 360 si SB decide no renovar? ¿Hay exportación garantizada en formato abierto?", context: "Una de las preocupaciones estratégicas es el vendor lock-in — el mismo argumento que llevó a SB a preferir O'Leary sobre IBM FileNet. Si los datos del cliente quedan atrapados en Data 360, es un riesgo inaceptable." },
            ]
        },
    ];

    const colorMap = {
        blue: { border: "border-blue-200", bg: "bg-blue-50", badge: "bg-blue-100 text-blue-800", active: "bg-blue-600 text-white" },
        amber: { border: "border-amber-200", bg: "bg-amber-50", badge: "bg-amber-100 text-amber-800", active: "bg-amber-500 text-white" },
        green: { border: "border-emerald-200", bg: "bg-emerald-50", badge: "bg-emerald-100 text-emerald-800", active: "bg-emerald-600 text-white" },
        red: { border: "border-red-200", bg: "bg-red-50", badge: "bg-red-100 text-red-800", active: "bg-red-600 text-white" },
        purple: { border: "border-purple-200", bg: "bg-purple-50", badge: "bg-purple-100 text-purple-800", active: "bg-purple-600 text-white" },
        slate: { border: "border-slate-200", bg: "bg-slate-50", badge: "bg-slate-100 text-slate-700", active: "bg-slate-700 text-white" },
    };

    const tipoConfig = {
        T: { label: "Técnica", cls: "tag-tec" },
        C: { label: "Comercial", cls: "tag-com" },
        N: { label: "Negociación", cls: "tag-neg" },
    };

    const b = bloques[activeBloque];
    const col = colorMap[b.color];
    const totalPreguntas = bloques.reduce((sum, bl) => sum + bl.preguntas.length, 0);

    return (
        <div className="animate-in space-y-6 pb-20">
            <SectionHeader eyebrow="Reunión con ejecutivo Salesforce" title="Agenda de preguntas" subtitle={`${totalPreguntas} preguntas técnicas y comerciales — Basadas en la propuesta V6 (Valentina Contreras, 19-Nov-2025)`} />

            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                <StatCard label="Preguntas totales" value={totalPreguntas} sub="en 6 bloques temáticos" color="green" />
                <StatCard label="Gasto anual actual SF" value="$270K" sub="USD/año — palanca de negociación" color="blue" />
                <StatCard label="Propuesta V6 — Opción A" value="$162K" sub="USD/año — a validar inconsistencias" color="yellow" />
                <StatCard label="Markup WhatsApp SF" value="57×–260×" sub="vs. precio de mercado" color="red" />
            </div>

            <AlertBox type="warn" text="Antes de la reunión: confirmar internamente los módulos SF activos hoy (CDP/CEP, Field Service) y qué funcionalidades están siendo usadas vs. contratadas. Eso determina el poder de negociación real." />

            <div className="flex flex-col xl:flex-row gap-5 items-start">
                {/* Bloques */}
                <div className="w-full xl:w-64 flex flex-col gap-2 shrink-0">
                    {bloques.map((bl, i) => {
                        const c2 = colorMap[bl.color];
                        return (
                            <button key={i} onClick={() => setActiveBloque(i)} className={`text-left p-4 rounded-2xl border-2 transition-all ${activeBloque === i ? `${c2.active} border-transparent shadow-md` : `bg-white border-slate-100 hover:border-slate-200`}`}>
                                <div className="flex items-center justify-between mb-1">
                                    <span className={`text-[9px] font-black uppercase tracking-wider ${activeBloque === i ? 'text-white/60' : 'text-slate-400'}`}>Bloque {bl.num}</span>
                                    <span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${activeBloque === i ? 'bg-white/20 text-white' : c2.badge}`}>{bl.preguntas.length} preg.</span>
                                </div>
                                <p className={`text-xs font-bold leading-snug ${activeBloque === i ? 'text-white' : 'text-slate-800'}`}>{bl.title}</p>
                            </button>
                        );
                    })}
                </div>

                {/* Preguntas */}
                <div className="flex-1 space-y-4">
                    <div className={`${col.bg} border ${col.border} rounded-2xl p-4 flex items-center gap-3`}>
                        <span className={`text-xs font-black px-3 py-1.5 rounded-full ${col.badge}`}>Bloque {b.num}</span>
                        <div><h3 className="font-black text-slate-900 text-sm">{b.title}</h3><p className="text-[10px] text-slate-500">{b.preguntas.length} preguntas — {b.tag}</p></div>
                    </div>

                    {b.preguntas.map((p, i) => {
                        const tipo = tipoConfig[p.tipo];
                        return (
                            <Card key={i}>
                                <div className="flex items-start gap-3">
                                    <span className={`text-[9px] font-black px-2 py-1 rounded mt-0.5 shrink-0 ${tipo.cls}`}>{tipo.label}</span>
                                    <div className="flex-1">
                                        <p className="text-sm font-bold text-slate-900 mb-2 leading-relaxed">{p.text}</p>
                                        <p className="text-[11px] text-slate-400 leading-relaxed italic">{p.context}</p>
                                    </div>
                                </div>
                            </Card>
                        );
                    })}

                    <div className="flex gap-2 flex-wrap text-[10px]">
                        <span className="tag-tec px-2 py-1 rounded font-black">T = Técnica</span>
                        <span className="tag-com px-2 py-1 rounded font-black">C = Comercial / licenciamiento</span>
                        <span className="tag-neg px-2 py-1 rounded font-black">N = Negociación / dato crítico</span>
                    </div>
                </div>
            </div>
        </div>
    );
};

// ─── NAV + APP ────────────────────────────────────────────────────────────────
const NavPill = ({ active, label, onClick }) => (
    <button onClick={onClick} className={`h-full px-4 text-[11px] font-extrabold transition-all flex items-center justify-center text-center leading-tight whitespace-nowrap border-b-4 ${active ? 'text-[#004A3B] border-[#004A3B] bg-slate-50' : 'text-slate-400 border-transparent hover:text-slate-600 hover:bg-slate-50'}`}>{label}</button>
);

const App = () => {
    const [currentView, setCurrentView] = useState(View.INICIO);
    const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

    useEffect(() => {
        const handleHashChange = () => {
            const hash = window.location.hash.replace('#', '');
            if (Object.values(View).includes(hash)) setCurrentView(hash);
        };
        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();
        return () => window.removeEventListener('hashchange', handleHashChange);
    }, []);

    const navigateTo = (view) => {
        setCurrentView(view);
        window.location.hash = view;
        setIsMobileMenuOpen(false);
        window.scrollTo(0, 0);
    };

    const navItems = [
        { view: View.INICIO, label: "Inicio" },
        { view: View.NOVEDADES, label: "1. Novedades SF" },
        { view: View.CASOS_USO, label: "Casos de uso" },
        { view: View.ARQUITECTURA, label: "Arquitectura" },
        { view: View.DATOS, label: "Datos requeridos" },
        { view: View.COMUNICACIONES, label: "2. Cartera" },
        { view: View.DATA_CLOUD, label: "3. Data Cloud vs DL" },
        { view: View.WHATSAPP, label: "4. WhatsApp" },
        { view: View.AGENDA, label: "Agenda SF" },
    ];

    const renderView = () => {
        switch (currentView) {
            case View.INICIO: return <HomeView onNavigate={navigateTo} />;
            case View.NOVEDADES: return <NovedadesView onNavigate={navigateTo} />;
            case View.CASOS_USO: return <CasosUsoView onNavigate={navigateTo} />;
            case View.ARQUITECTURA: return <ArquitecturaView onNavigate={navigateTo} />;
            case View.DATOS: return <DatosView onNavigate={navigateTo} />;
            case View.COMUNICACIONES: return <ComunicacionesView onNavigate={navigateTo} />;
            case View.DATA_CLOUD: return <DataCloudView onNavigate={navigateTo} />;
            case View.WHATSAPP: return <WhatsappView onNavigate={navigateTo} />;
            case View.AGENDA: return <AgendaView onNavigate={navigateTo} />;
            default: return <HomeView onNavigate={navigateTo} />;
        }
    };

    return (
        <div className="flex flex-col h-screen bg-canvas-bg font-sans">
            <header className="no-print sticky top-0 z-50 bg-white border-b border-slate-200 h-20 shrink-0 shadow-sm">
                <div className="max-w-[1800px] mx-auto h-full flex items-center px-6">
                    <div className="flex items-center gap-4 shrink-0 mr-8 cursor-pointer" onClick={() => navigateTo(View.INICIO)}>
                        <img src={logoUrl} alt="Seguros Bolívar" className="h-10 w-auto object-contain" />
                        <div className="h-10 w-[1px] bg-slate-200"></div>
                        <div className="flex flex-col leading-none">
                            <span className="text-[12px] font-black text-[#004A3B] uppercase tracking-tight">Análisis</span>
                            <span className="text-[12px] font-black text-[#004A3B] uppercase tracking-tight">Salesforce 2026</span>
                        </div>
                    </div>
                    <nav className="hidden xl:flex items-center h-full flex-1 overflow-x-auto">
                        {navItems.map(item => <NavPill key={item.view} active={currentView === item.view} label={item.label} onClick={() => navigateTo(item.view)} />)}
                    </nav>
                    <div className="flex items-center gap-3 ml-4">
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="xl:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg">
                            <span className="material-symbols-outlined">{isMobileMenuOpen ? 'close' : 'menu'}</span>
                        </button>
                    </div>
                </div>
                {isMobileMenuOpen && (
                    <div className="absolute top-20 left-0 w-full bg-white border-b border-slate-200 shadow-2xl xl:hidden z-50 animate-in slide-in-from-top-4">
                        <div className="p-4 grid grid-cols-2 gap-2">
                            {navItems.map(item => (
                                <button key={item.view} onClick={() => navigateTo(item.view)} className={`px-4 py-3 rounded-xl text-left text-[12px] font-bold transition-all ${currentView === item.view ? 'bg-[#004A3B] text-white' : 'bg-slate-50 text-slate-600'}`}>{item.label}</button>
                            ))}
                        </div>
                    </div>
                )}
            </header>
            <main className="flex-1 overflow-y-auto bg-canvas-bg">
                <div className={currentView === View.INICIO ? "max-w-[1400px] mx-auto p-6 md:p-10" : "max-w-[1400px] mx-auto p-6 md:p-10"}>
                    {renderView()}
                </div>
            </main>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
